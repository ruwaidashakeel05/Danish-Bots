<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>LearnoBots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 20% 15%, rgba(99, 91, 255, 0.08), transparent 40%),
                radial-gradient(circle at 80% 85%, rgba(255, 145, 77, 0.06), transparent 40%),
                #0d0c16;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .navbar {
            display: flex;
            align-items: center;
            padding: 14px 26px;
            background: #14121f;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo {
            width: 34px;
            height: 34px;
            border-radius: 9px;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            display: flex;
            gap: 30px;
        }

        .card {
            width: 280px;
            background: linear-gradient(180deg, #1c1a2b 0%, #17152400 100%), #191725;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 40px 30px 34px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.04) inset,
                0 20px 40px rgba(0, 0, 0, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 0 16px 1px var(--accent);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.06) inset,
                0 28px 55px rgba(0, 0, 0, 0.45);
        }

        .icon-wrap {
            width: 76px;
            height: 76px;
            margin: 0 auto 22px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent-dim));
            box-shadow: 0 8px 20px var(--accent-shadow);
        }

        .icon-wrap svg {
            width: 36px;
            height: 36px;
        }

        .card h2 {
            color: #f1f0f7;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .card p {
            color: #8b87a3;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .encyclopedia {
            --accent: #5b8cff;
            --accent-soft: #7fa4ff;
            --accent-dim: #3a5fd9;
            --accent-shadow: rgba(91, 140, 255, 0.35);
        }

        .library {
            --accent: #ff9a4d;
            --accent-soft: #ffb377;
            --accent-dim: #e6772a;
            --accent-shadow: rgba(255, 154, 77, 0.35);
        }

        .wikipedia {
            --accent: #2fbf8f;
            --accent-soft: #5fd9ac;
            --accent-dim: #1a9e6e;
            --accent-shadow: rgba(47, 191, 143, 0.35);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">
            <img src="assets/lob.png" alt="Logo" style="width: 100%; height: 100%; border-radius: 9px;">
        </div>
    </div>

    <div class="main">
        <div class="grid">

            <div class="card encyclopedia" id="encyclopediaCard">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M4 4.5C4 3.67 4.67 3 5.5 3H12V21H5.5C4.67 21 4 20.33 4 19.5V4.5Z" fill="white"
                            fill-opacity="0.95" />
                        <path d="M20 4.5C20 3.67 19.33 3 18.5 3H12V21H18.5C19.33 21 20 20.33 20 19.5V4.5Z" fill="white"
                            fill-opacity="0.7" />
                        <line x1="12" y1="3" x2="12" y2="21" stroke="#3a5fd9" stroke-width="0.6" />
                    </svg>
                </div>
                <h2>Encyclopedia</h2>
                <p>Explore Britannica</p>
            </div>

            <div class="card library" id="libraryCard">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path
                            d="M4 5C4 4.45 4.45 4 5 4H19C19.55 4 20 4.45 20 5V16C20 16.55 19.55 17 19 17H12L8 20V17H5C4.45 17 4 16.55 4 16V5Z"
                            fill="white" fill-opacity="0.95" />
                        <circle cx="9" cy="10.5" r="1.2" fill="#e6772a" />
                        <circle cx="15" cy="10.5" r="1.2" fill="#e6772a" />
                    </svg>
                </div>
                <h2>Library</h2>
                <p>British Council</p>
            </div>

            <div class="card wikipedia" id="wikipediaCard">
                <div class="icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path
                            d="M12 6C10 4.5 6.5 4 4 4.5V18.5C6.5 18 10 18.5 12 20C14 18.5 17.5 18 20 18.5V4.5C17.5 4 14 4.5 12 6Z"
                            fill="white" fill-opacity="0.95" />
                        <path d="M12 6V20" stroke="#1a9e6e" stroke-width="0.8" />
                    </svg>
                </div>
                <h2>Wikipedia</h2>
                <p>Explore free knowledge</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('encyclopediaCard').addEventListener('click', () => {
            window.location.href = 'encyclopedia.html'
        })

        document.getElementById('libraryCard').addEventListener('click', () => {
            window.location.href = 'library.html'
        })

        document.getElementById('wikipediaCard').addEventListener('click', () => {
            window.location.href = 'wikipedia.html'
        })
    </script>

</body>

</html>
